# Split out of ci.yml (Phase 3): GitHub Actions has no job-level path
# filter, only a workflow-level on.push/on.pull_request.paths-ignore, so a
# docs-only push skipping *only* this job (not lint-and-test/pip-audit)
# requires its own workflow file. Markdown/docs changes cannot affect
# flatten<->source parity, so they are excluded here; ci.yml's
# lint-and-test and pip-audit stay unconditional (no paths filter).
name: Flatten parity

on:
  push:
    paths-ignore:
      - "**.md"
      - "docs/**"
  pull_request:
    paths-ignore:
      - "**.md"
      - "docs/**"

jobs:
  flatten-parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v9.0.0
        with:
          version: "0.11.29"
      - run: uv python install 3.12
      # stdlib-only (flatten.py, harness/run.py, harness/attribution.py):
      # no research extras needed for this job.
      - run: uv sync --extra dev
      # Explicit, standalone freshness gate: fails loudly on a stale/hand-
      # edited committed submission before any test runs, independent of
      # pytest's own test-execution order (PLAN.md §6: "diff-checked in CI").
      - run: uv run python -m p4alpha.flatten.flatten --check
      # tests/flatten/ picked up with no -m filter: both the fast structural
      # checks and the parity-marked real-engine backtests run here.
      - run: uv run pytest tests/flatten/ -q
