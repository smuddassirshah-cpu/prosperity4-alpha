# flatten-parity job joins this workflow at Stage 8, once submissions/ exists.
name: CI

on:
  push:
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "0.11.29"
      - run: uv python install 3.12
      - run: uv sync --extra dev --extra research
      - run: uv run ruff check .
      - run: uv run pytest -q

  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "0.11.29"
      - run: uv python install 3.12
      - run: uv sync --extra dev --extra research
      - run: uv run pip-audit
