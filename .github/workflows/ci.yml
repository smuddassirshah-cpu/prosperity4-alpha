name: CI

on:
  push:
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v9.0.0
        with:
          version: "0.11.29"
      - run: uv python install ${{ matrix.python-version }}
      - run: uv sync --extra dev --extra research --python ${{ matrix.python-version }}
      - run: uv run --python ${{ matrix.python-version }} ruff check .
      # parity-marked tests (tests/flatten/test_parity.py) are real-engine
      # backtests, slower than the rest of this suite; excluded here and run
      # explicitly by the dedicated flatten-parity job below.
      - run: uv run --python ${{ matrix.python-version }} pytest -q -m "not parity"

  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v9.0.0
        with:
          version: "0.11.29"
      - run: uv python install 3.12
      - run: uv sync --extra dev --extra research
      - run: uv run pip-audit

# flatten-parity moved to its own workflow (flatten-parity.yml, Phase 3):
# it has a paths-ignore for docs-only pushes, which GitHub Actions can only
# express at the workflow level, not per-job. lint-and-test and pip-audit
# above stay unconditional, exactly as before.
